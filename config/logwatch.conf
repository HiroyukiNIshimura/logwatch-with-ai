# logwatch configuration for custom monitoring
# This file defines which log files to monitor for the logwatch-ai integration

# System logs
logfiles = messages
logfiles = syslog
logfiles = kern.log

# Web servers
logfiles = apache-access
logfiles = apache-error
logfiles = nginx

# SSH
logfiles = sshd

# Firewall
logfiles = ufw

# Authentication
logfiles = auth.log
